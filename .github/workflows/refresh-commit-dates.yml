name: Refresh Commit Dates

# Weekly job that refreshes lib/portfolio-meta.ts with the most recent
# commit date for every repoUrl in lib/portfolio.ts. Used by the
# lifecycle-taxonomy verifier (ADR 0001) to enforce commit-cadence
# rules (`building` <60d, `prototype` >30d, `maintained` >90d).
#
# Opens a PR if anything changed; merges by hand so the PR cycle still
# applies (and so a verifier change triggered by stale dates doesn't
# silently land).

on:
  schedule:
    # Mondays 08:00 UTC ≈ early-morning Pacific.
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    name: Refresh portfolio commit dates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Refresh commit dates
        run: npm run refresh:commit-dates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(portfolio-meta): refresh commit dates"
          title: "chore(portfolio-meta): weekly commit-date refresh"
          body: |
            Auto-generated by `.github/workflows/refresh-commit-dates.yml`.

            Refreshes `lib/portfolio-meta.ts` with the latest commit dates
            from each intervention's repository. Used by the lifecycle
            verifier (`npm run verify:portfolio`) to enforce ADR 0001's
            commit-cadence rules.

            If CI fails on this PR, the verifier surfaced an inconsistency —
            the right fix is usually to update the intervention's `status`
            in `lib/portfolio.ts` (or its `featureComplete` flag) to match
            the actual cadence.
          branch: chore/refresh-commit-dates
          delete-branch: true
          add-paths: lib/portfolio-meta.ts
